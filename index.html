<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>파생상품 규정 도우미</title>
    
    <!-- SUIT Variable Font -->
    <link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    
    <!-- Tailwind CSS & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            font-family: 'SUIT Variable', sans-serif !important;
            letter-spacing: -0.025em; /* 자간을 조금 더 좁혀 가독성 향상 */
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }
        body { background-color: #F2F7FF; margin: 0; padding: 0; height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
        #root { width: 100%; height: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* [중대 수정] 말풍선 여백 및 글자 비율 조정 */
        .bubble-box { 
            display: inline-block;
            max-width: 100%; 
            word-wrap: break-word;
            word-break: break-all;      /* 모바일 환경 강제 줄바꿈 최우선 */
            overflow-wrap: anywhere; 
            white-space: pre-wrap;
            line-height: 1.6;           /* 행간을 넓혀 가독성 확보 */
            font-size: 14.5px;          /* 글자 비율을 살짝 낮춤 */
        }

        .highlight { color: #3182F6; font-weight: 700; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const App = () => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([
                {
                    id: 'init',
                    role: 'assistant',
                    content: "안녕하세요. \"파생상품시장 업무규정\"에 대해 궁금한 점이 있다면 무엇이든 물어보세요.",
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }
            ]);
            const [isLoading, setIsLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                if (window.lucide) window.lucide.createIcons();
            }, [messages, isLoading]);

            const renderMessage = (text) => {
                return text.split('\n').map((line, i) => {
                    // AI가 보낸 볼드체(**)를 파란색 볼드체로 변환
                    const parts = line.split(/(\*\*.*?\*\*)/g);
                    return (
                        <div key={i} className="min-h-[1.4em] mb-0.5">
                            {parts.map((part, j) => {
                                if (part.startsWith('**') && part.endsWith('**')) {
                                    return <span key={j} className="highlight">{part.slice(2, -2)}</span>;
                                }
                                return part;
                            })}
                        </div>
                    );
                });
            };

            const handleSend = async (e) => {
                if (e) e.preventDefault();
                if (!input.trim() || isLoading) return;

                const query = input;
                setMessages(prev => [...prev, {
                    id: Date.now().toString(),
                    role: 'user',
                    content: query,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }]);
                setInput('');
                setIsLoading(true);

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, {
                        id: (Date.now() + 1).toString(),
                        role: 'assistant',
                        content: data.text || "답변을 가져오지 못했어요.",
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    }]);
                } catch (err) {
                    setMessages(prev => [...prev, { id: 'err', role: 'assistant', content: "연결이 원활하지 않아요.", time: "" }]);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-full w-full bg-[#F2F7FF] overflow-hidden">
                    <header className="px-6 py-5 flex items-center justify-between bg-white/90 backdrop-blur-xl border-b border-blue-50/50 sticky top-0 z-30 shadow-sm flex-shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-[#3182F6] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                                <i data-lucide="shield-check" size="22"></i>
                            </div>
                            <div>
                                <h1 className="text-[17px] font-bold text-gray-900 leading-tight">규정 분석기</h1>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                                    <span className="text-[10px] font-bold text-[#3182F6] uppercase tracking-widest tracking-tight">Official KRX Expert</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-6 space-y-7 no-scrollbar scroll-smooth">
                        <AnimatePresence initial={false}>
                            {messages.map((m) => (
                                <motion.div key={m.id} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} w-full`}>
                                    <div className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'} max-w-[85%]`}>
                                        <div className={`px-5 py-3.5 rounded-[22px] bubble-box shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-[#3182F6] text-white rounded-tr-none' 
                                            : 'bg-white text-gray-800 rounded-tl-none border border-blue-50/50'
                                        }`}>
                                            {renderMessage(m.content)}
                                        </div>
                                        <div className="text-[10px] text-gray-400 mt-2 px-1 font-semibold opacity-60 uppercase tracking-tighter">{m.time}</div>
                                    </div>
                                </motion.div>
                            ))}
                            {isLoading && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex justify-start">
                                    <div className="bg-white/60 backdrop-blur-sm px-5 py-3.5 rounded-[22px] rounded-tl-none flex items-center gap-3 border border-blue-50/30">
                                        <div className="flex gap-1.5">
                                            <div className="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce" style={{animationDelay:'0ms'}}></div>
                                            <div className="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce" style={{animationDelay:'150ms'}}></div>
                                            <div className="w-1.5 h-1.5 bg-blue-300 rounded-full animate-bounce" style={{animationDelay:'300ms'}}></div>
                                        </div>
                                        <span className="text-[12px] text-blue-400 font-bold">분석 중</span>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <div className="bg-white px-4 pt-3 pb-8 border-t border-blue-50/30 safe-bottom flex-shrink-0">
                        <form onSubmit={handleSend} className="flex items-center gap-2 bg-[#F2F6FF] p-1.5 rounded-[24px] border border-transparent focus-within:border-[#3182F6] focus-within:bg-white transition-all shadow-inner w-full">
                            <input 
                                type="text" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)} 
                                placeholder="질문을 입력하세요" 
                                className="flex-1 min-w-0 bg-transparent px-4 py-3 text-[15px] outline-none text-gray-800" 
                            />
                            <button 
                                type="submit" 
                                disabled={!input.trim() || isLoading} 
                                className={`w-12 h-12 flex-shrink-0 rounded-[20px] flex items-center justify-center transition-all ${
                                    input.trim() && !isLoading ? 'bg-[#3182F6] text-white shadow-lg shadow-blue-100' : 'bg-gray-200 text-gray-400'
                                }`}
                            >
                                <i data-lucide="arrow-up" size="22"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
